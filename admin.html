<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ProgressOr Admin</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #f0f2f9; --surface: #ffffff; --border: #e2e5f0;
      --text: #111827; --text3: #6b7280; --accent: #3b5bdb;
      --accent-l: #eef1ff; --accent-b: #c7d0f8;
      --sans: -apple-system, 'Inter', sans-serif;
      --mono: 'JetBrains Mono', ui-monospace, monospace;
    }
    body { font-family: var(--sans); background: var(--bg); color: var(--text); min-height: 100vh; -webkit-font-smoothing: antialiased; }
    button { cursor: pointer; font-family: inherit; }

    #gate {
      min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 24px;
    }
    .box {
      background: var(--surface); border: 1px solid var(--border); border-radius: 20px;
      padding: 48px 40px; width: 100%; max-width: 420px;
      box-shadow: 0 20px 60px rgba(59,91,219,.10), 0 4px 16px rgba(0,0,0,.06);
    }
    .logo { display: flex; align-items: center; gap: 12px; margin-bottom: 36px; }
    .logo-mark {
      width: 44px; height: 44px; background: #171a2d; border-radius: 12px;
      display: flex; align-items: center; justify-content: center;
      box-shadow: 0 4px 12px rgba(0,0,0,.25);
    }
    .logo-text { display: flex; flex-direction: column; gap: 4px; }
    .logo-name { font-size: 16px; font-weight: 700; letter-spacing: -.3px; }
    .chip {
      display: inline-flex; align-items: center; gap: 5px;
      background: var(--accent-l); color: var(--accent); border: 1px solid var(--accent-b);
      font-size: 10px; font-family: var(--mono); font-weight: 600; letter-spacing: .06em;
      padding: 2px 8px; border-radius: 6px; width: fit-content;
    }
    .chip::before { content: ''; width: 6px; height: 6px; border-radius: 50%; background: var(--accent); }
    h1 { font-size: 22px; font-weight: 700; letter-spacing: -.4px; margin-bottom: 10px; }
    p  { font-size: 14px; color: var(--text3); line-height: 1.6; margin-bottom: 32px; }
    .btn {
      display: flex; align-items: center; justify-content: center; gap: 8px;
      width: 100%; padding: 12px 20px; background: var(--accent); color: #fff;
      border: none; border-radius: 10px; font-size: 14px; font-weight: 600;
      text-decoration: none; transition: all .15s;
      box-shadow: 0 2px 8px rgba(59,91,219,.3);
    }
    .btn:hover { background: #2f4ec7; box-shadow: 0 4px 12px rgba(59,91,219,.4); }

    #spinner {
      min-height: 100vh; display: flex; align-items: center; justify-content: center;
      flex-direction: column; gap: 12px; color: var(--text3); font-size: 13px;
      font-family: var(--mono);
    }
    .spin {
      width: 18px; height: 18px; border: 2px solid currentColor; border-top-color: transparent;
      border-radius: 50%; animation: rot .65s linear infinite;
    }
    @keyframes rot { to { transform: rotate(360deg) } }
    .hidden { display: none !important; }
  </style>
</head>
<body>

<div id="spinner">
  <div class="spin"></div>
  <span>Opening admin…</span>
</div>

<div id="gate" class="hidden">
  <div class="box">
    <div class="logo">
      <div class="logo-mark">
        <svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="8"/><circle cx="12" cy="12" r="3"/>
          <line x1="12" y1="1" x2="12" y2="4"/><line x1="12" y1="20" x2="12" y2="23"/>
          <line x1="1" y1="12" x2="4" y2="12"/><line x1="20" y1="12" x2="23" y2="12"/>
          <line x1="4.22" y1="4.22" x2="6.34" y2="6.34"/><line x1="17.66" y1="17.66" x2="19.78" y2="19.78"/>
          <line x1="4.22" y1="19.78" x2="6.34" y2="17.66"/><line x1="17.66" y1="6.34" x2="19.78" y2="4.22"/>
        </svg>
      </div>
      <div class="logo-text">
        <div class="logo-name">ProgressOr</div>
        <span class="chip">Admin Panel</span>
      </div>
    </div>
    <h1 id="gate-title">Sign in required</h1>
    <p id="gate-hint">Sign in to your admin account in the main app first, then return here.</p>
    <a class="btn" href="./">
      <svg viewBox="0 0 16 16" width="15" height="15" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M8 3l5 5-5 5"/><line x1="3" y1="8" x2="13" y2="8"/></svg>
      Open ProgressOr
    </a>
  </div>
</div>

<script>
  const token = localStorage.getItem('pm_tracker_token');
  if (token) {
    localStorage.setItem('pm_open_admin', '1');
    window.location.replace('./');
  } else {
    document.getElementById('spinner').classList.add('hidden');
    document.getElementById('gate').classList.remove('hidden');
  }
</script>
</body>
</html>
